<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планировщик</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:#f5f7fa;">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/tasks/">📋 Планировщик</a>

    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">Привет, {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Войти</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>

{% url 'tasks:toggle' task.id %}
