<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Planner{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Planner</a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-2">{{ user.username }}</span>
               <form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-sm btn-outline-light">Выйти</button>
</form>
            {% else %}
                <a href="/login/" class="btn btn-sm btn-outline-light me-2">Вход</a>
                <a href="/register/" class="btn btn-sm btn-light">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<style>
  body {
    background: #f8f9fa;
  }
</style>
