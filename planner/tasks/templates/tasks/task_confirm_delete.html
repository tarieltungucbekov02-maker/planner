<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление задачи</title>
</head>
<body>

<div class="container mt-5">

    <h3>Удалить задачу "{{ task.title }}"?</h3>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'tasks:list' %}" class="btn btn-secondary">Отмена</a>
    </form>

</div>

</body>
</html>
