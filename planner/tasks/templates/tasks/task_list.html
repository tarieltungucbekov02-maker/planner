<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задачи</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>📋 Мои задачи</h2>

    <form method="post" action="{% url 'tasks:task_add' %}">
        {% csrf_token %}
        <input name="title" placeholder="Название" class="form-control mb-2">
        <textarea name="description" placeholder="Описание" class="form-control mb-2"></textarea>
        <button class="btn btn-success">Добавить</button>
    </form>

    <hr>

    {% for task in tasks %}
        <div class="card mb-2">
            <div class="card-body">

                <h5 class="{% if task.completed %}text-decoration-line-through{% endif %}">
                    {{ task.title }}
                </h5>

                <p>{{ task.description }}</p>

                <small>📅 {{ task.created_at|date:"d.m.Y H:i" }}</small>

                <div class="mt-2">

                    <form method="post" action="{% url 'tasks:task_toggle' task.id %}">
                        {% csrf_token %}
                        <button class="btn btn-success btn-sm">✔</button>
                    </form>

                    <form method="post" action="{% url 'tasks:task_delete' task.id %}">
                        {% csrf_token %}
                        <button class="btn btn-danger btn-sm">Удалить</button>
                    </form>

                </div>

            </div>
        </div>
    {% endfor %}

</div>

</body>
</html>
